name: Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build-windows-exe:
    name: Build standalone Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build standalone app
        run: npx --yes @tauri-apps/cli@2 build --no-bundle

      - name: Rename executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item target\release\wifi-scanner-app.exe artifacts\WiFiScanner.exe -Force

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: WiFiScanner-windows-x64-exe
          path: artifacts/WiFiScanner.exe
