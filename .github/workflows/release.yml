name: Release

on:
  workflow_run:
    workflows: ["Windows EXE", "macOS APP"]
    types: [completed]

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish-release:
    name: Publish release when platform builds are ready
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'

    steps:
      - name: Find matching platform builds
        id: runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          find_run() {
            local workflow="$1"
            gh api --method GET "repos/${REPO}/actions/workflows/${workflow}/runs" \
              -F head_sha="$SHA" \
              -F branch="$BRANCH" \
              -F status=success \
              --jq '.workflow_runs | sort_by(.created_at) | reverse | .[0].id // empty'
          }

          windows_run="$(find_run windows-exe.yml)"
          macos_run="$(find_run macos-app.yml)"

          if [[ -z "$windows_run" || -z "$macos_run" ]]; then
            echo "Both platform builds are not ready for $SHA yet."
            echo "windows_run=$windows_run"
            echo "macos_run=$macos_run"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "windows_run=$windows_run" >> "$GITHUB_OUTPUT"
          echo "macos_run=$macos_run" >> "$GITHUB_OUTPUT"
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        if: steps.runs.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p release-assets/windows release-assets/macos
          gh run download "${{ steps.runs.outputs.windows_run }}" \
            --repo "$REPO" \
            --name WiFiScanner-windows-x64-exe \
            --dir release-assets/windows
          gh run download "${{ steps.runs.outputs.macos_run }}" \
            --repo "$REPO" \
            --name WiFiScanner-macos-arm64-dmg \
            --dir release-assets/macos

      - name: Publish GitHub Release
        if: steps.runs.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          short_sha="${SHA:0:7}"
          tag="build-${SHA:0:12}"

          if gh release view "$tag" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping."
            exit 0
          fi

          gh release create "$tag" \
            release-assets/windows/WiFiScanner.exe \
            release-assets/macos/WiFiScanner-macos-arm64.dmg \
            --repo "$REPO" \
            --target "$SHA" \
            --title "WiFi Scanner ${short_sha}" \
            --notes "Automated build for commit ${SHA}."
